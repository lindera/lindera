[package]
name = "lindera-wasm"
version = { workspace = true }
edition = { workspace = true }
description = "A morphological analysis library for WebAssembly."
documentation = { workspace = true }
homepage = { workspace = true }
repository = { workspace = true }
readme = "README.md"
keywords = ["morphological", "analysis", "library", "wasm", "webassembly"]
categories = ["text-processing"]
license = { workspace = true }

[lib]
crate-type = ["cdylib"]

[features]
embed-ipadic = ["lindera/embed-ipadic"] # Embed IPADIC dictionary (Japanese)
embed-unidic = ["lindera/embed-unidic"] # Embed UniDic dictionary (Japanese)
embed-ko-dic = ["lindera/embed-ko-dic"] # Embed ko-dic dictionary (Korean)
embed-cc-cedict = [
    "lindera/embed-cc-cedict",
] # Embed CC-CEDICT dictionary (Chinese)
embed-jieba = ["lindera/embed-jieba"] # Embed Jieba dictionary (Chinese)
embed-cjk = [
    "lindera/embed-cjk",
] # Embed CJK dictionaries (IPADIC, ko-dic, Jieba)
default = []

[dependencies]
js-sys = "0.3.91"
lindera = { workspace = true }
lindera-dictionary = { workspace = true }
once_cell = { workspace = true }
rkyv = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
serde_json = { workspace = true }
wasm-bindgen = { version = "0.2.114" }

[dev-dependencies]
serde_json = { workspace = true }
wasm-bindgen = { version = "0.2.114" }
wasm-bindgen-test = "0.3.64"
