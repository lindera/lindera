[workspace]
members = [
    "lindera-dictionary",
    "lindera-cc-cedict",
    "lindera-jieba",
    "lindera-ipadic",
    "lindera-ipadic-neologd",
    "lindera-ko-dic",
    "lindera-unidic",
    "lindera",
    "lindera-cli",
    "lindera-python",
    "lindera-wasm",
]
resolver = "2"

[workspace.package]
version = "2.3.1"
edition = "2024"
description = "A morphological analysis libraries and command line interface."
documentation = "https://docs.rs/lindera"
homepage = "https://github.com/lindera/lindera"
repository = "https://github.com/lindera/lindera"
readme = "README.md"
keywords = ["morphological", "analysis", "library", "dictionary", "cli"]
categories = ["text-processing"]
license = "MIT"

[workspace.dependencies]
anyhow = "1.0.102"
byteorder = "1.5.0"
csv = "1.4.0"
daachorse = "1.0.0"
lindera = { version = "2.3.1", path = "lindera" }
lindera-cc-cedict = { version = "2.3.1", path = "lindera-cc-cedict" }
lindera-cli = { version = "2.3.1", path = "lindera-cli" }
lindera-dictionary = { version = "2.3.1", path = "lindera-dictionary" }
lindera-ipadic = { version = "2.3.1", path = "lindera-ipadic" }
lindera-ipadic-neologd = { version = "2.3.1", path = "lindera-ipadic-neologd" }
lindera-jieba = { version = "2.3.1", path = "lindera-jieba" }
lindera-ko-dic = { version = "2.3.1", path = "lindera-ko-dic" }
lindera-python = { version = "2.3.1", path = "lindera-python" }
lindera-unidic = { version = "2.3.1", path = "lindera-unidic" }
lindera-wasm = { version = "2.3.1", path = "lindera-wasm" }
log = "0.4.29"
num_cpus = "1.17.0"
once_cell = "1.21.4"
regex = "1.12.3"
rkyv = { version = "0.8.15", features = ["bytecheck"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
strum = { version = "0.28.0", features = ["derive"] }
strum_macros = "0.28.0"
tokio = { version = "1.50.0", features = [
    "rt",
    "macros",
    "time",
    "sync",
    "io-util",
] }

[profile.release]
lto = true

# Make sure that the build scripts and proc-macros are compiled with
# all the optimizations. It speeds up the flate2 crate that we use in our build scripts.
[profile.dev.build-override]
opt-level = 3
[profile.release.build-override]
opt-level = 3
[profile.bench.build-override]
opt-level = 3
[profile.test.build-override]
opt-level = 3

[profile.release.package.lindera-wasm]
opt-level = "s"
