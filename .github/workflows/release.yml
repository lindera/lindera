name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Run format
        run: cargo fmt --all -- --check

  test-lindera-crf:
    name: Test lindera-crf
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-crf

  test-lindera-dictionary:
    name: Test lindera-dictionary (${{ matrix.platform.target }})
    needs: [format, test-lindera-crf]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Run test
        run: cargo test -p lindera-dictionary --features train --target "${{ matrix.platform.target }}"

  test-lindera-ipadic:
    name: Test lindera-ipadic
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-ipadic --features embed-ipadic

  test-lindera-ipadic-neologd:
    name: Test lindera-ipadic-neologd
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-ipadic-neologd --features embed-ipadic-neologd

  test-lindera-unidic:
    name: Test lindera-unidic
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-unidic --features embed-unidic

  test-lindera-ko-dic:
    name: Test lindera-ko-dic
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-ko-dic --features embed-ko-dic

  test-lindera-cc-cedict:
    name: Test lindera-cc-cedict
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-cc-cedict --features embed-cc-cedict

  test-lindera-jieba:
    name: Test lindera-jieba
    needs: [test-lindera-dictionary]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-jieba --features embed-jieba

  test-lindera:
    name: Test lindera (${{ matrix.platform.target }})
    needs:
      - test-lindera-dictionary
      - test-lindera-ipadic
      - test-lindera-ipadic-neologd
      - test-lindera-unidic
      - test-lindera-ko-dic
      - test-lindera-cc-cedict
      - test-lindera-jieba
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Run test
        run: cargo test -p lindera --features embed-ipadic,embed-ko-dic,train --target "${{ matrix.platform.target }}"

  test-lindera-cli:
    name: Test lindera-cli
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run test
        run: cargo test -p lindera-cli --features train

  test-lindera-python:
    name: Test lindera-python
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Run Python test
        shell: bash
        run: |
          make test-lindera-python

  test-lindera-nodejs:
    name: Test lindera-nodejs
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run Node.js build
        run: |
          make test-lindera-nodejs

  test-lindera-ruby:
    name: Test lindera-ruby
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: lindera-ruby

      - name: Run Ruby test
        shell: bash
        run: |
          make test-lindera-ruby

  test-lindera-php:
    name: Test lindera-php
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Run PHP test
        shell: bash
        run: |
          make test-lindera-php

  test-lindera-wasm:
    name: Test lindera-wasm
    needs: [test-lindera]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM test
        run: |
          make test-lindera-wasm

  create-release:
    name: Create Release
    needs:
      [
        test-lindera-cli,
        test-lindera-python,
        test-lindera-nodejs,
        test-lindera-ruby,
        test-lindera-php,
        test-lindera-wasm,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true

  build-dictionary:
    name: Build Dictionary (${{ matrix.dictionary.name }})
    needs: [create-release]
    strategy:
      matrix:
        dictionary:
          - name: "lindera-ipadic"
            feature: "embed-ipadic"
          - name: "lindera-unidic"
            feature: "embed-unidic"
          - name: "lindera-ko-dic"
            feature: "embed-ko-dic"
          - name: "lindera-cc-cedict"
            feature: "embed-cc-cedict"
          - name: "lindera-ipadic-neologd"
            feature: "embed-ipadic-neologd"
          - name: "lindera-jieba"
            feature: "embed-jieba"
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build dictionary
        run: |
          LINDERA_DICTIONARIES_PATH=dictionaries cargo build -p ${{ matrix.dictionary.name }} --features ${{ matrix.dictionary.feature }}

      - name: Get version
        id: get_version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name=="${{ matrix.dictionary.name }}") | .version')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create artifact
        run: |
          cd dictionaries/${{ steps.get_version.outputs.version }}
          zip -r ../../${{ matrix.dictionary.name }}-${{ steps.get_version.outputs.version }}.zip ${{ matrix.dictionary.name }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: ${{ matrix.dictionary.name }}-${{ steps.get_version.outputs.version }}.zip
          tag_name: ${{ github.ref_name }}

      - name: Upload dictionary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.dictionary.name }}
          path: dictionaries/

  build:
    name: Build binaries for ${{ matrix.platform.target }}
    needs: [create-release]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: .zip
            extension: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: .zip
            extension: ""
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: .zip
            extension: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive: .zip
            extension: ""
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: .zip
            extension: .exe
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            archive: .zip
            extension: .exe
        toolchain: [stable]

    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform.target }}

      - name: Add msbuild to PATH
        if: startsWith(matrix.platform.runner, 'windows')
        uses: microsoft/setup-msbuild@v3

      - name: Compile
        run: cargo build -p lindera-cli --release --target=${{ matrix.platform.target }}

      - name: Create artifact for Unix
        if: "!startsWith(matrix.platform.runner, 'windows')"
        run: zip --junk-paths lindera-${{ matrix.platform.target }}-${{ github.ref_name }}${{ matrix.platform.archive }} target/${{ matrix.platform.target }}/release/lindera${{ matrix.platform.extension }}

      - name: Create artifact for Windows
        if: startsWith(matrix.platform.runner, 'windows')
        run: powershell Compress-Archive -DestinationPath lindera-${{ matrix.platform.target }}-${{ github.ref_name }}${{ matrix.platform.archive }} -Path target/${{ matrix.platform.target }}/release/lindera${{ matrix.platform.extension }}

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: lindera-${{ matrix.platform.target }}-${{ github.ref_name }}${{ matrix.platform.archive }}
          tag_name: ${{ github.ref_name }}

  build-python-wheels:
    name: Build wheels for ${{ matrix.platform.target }}
    needs: [create-release]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path lindera-python/Cargo.toml
          sccache: "true"
          manylinux: auto
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install openssl-devel devtoolset-10-libatomic-devel perl-IPC-Cmd -y
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update && apt-get install libssl-dev pkg-config -y
            fi

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: wheels-lindera-python-${{ runner.os }}-${{ matrix.platform.target }}-${{ github.ref_name }}
          path: dist

  build-python-sdist:
    name: Build sdist
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path lindera-python/Cargo.toml

      - name: Upload artifact
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}

      - name: Upload to workflow artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sdist-lindera-python-${{ github.ref_name }}
          path: dist

  build-ruby-gems:
    name: Build Ruby Gem (${{ matrix.platform.ruby_platform }})
    needs: [create-release]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ruby_platform: x86_64-linux
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ruby_platform: aarch64-linux
          - runner: macos-latest
            target: aarch64-apple-darwin
            ruby_platform: arm64-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ruby_platform: x86_64-darwin
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: lindera-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Update gem version
        working-directory: lindera-ruby
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/spec.version = \".*\"/spec.version = \"${VERSION}\"/" lindera.gemspec
          rm -f lindera.gemspec.bak

      - name: Build gem
        working-directory: lindera-ruby
        shell: bash
        run: |
          bundle install --quiet
          bundle exec rake compile
          gem build lindera.gemspec

      - name: Upload gem artifact
        uses: actions/upload-artifact@v7
        with:
          name: gem-lindera-${{ matrix.platform.ruby_platform }}-${{ github.ref_name }}
          path: lindera-ruby/*.gem
          if-no-files-found: error

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: lindera-ruby/*.gem
          tag_name: ${{ github.ref_name }}

  build-php:
    name: Build PHP (${{ matrix.platform.target }})
    needs: [create-release]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Build PHP extension
        shell: bash
        run: |
          cargo build -p lindera-php --release

      - name: Package extension
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.platform.target }}"
          ARCHIVE_NAME="lindera-php-${VERSION}-${TARGET}"
          mkdir -p "${ARCHIVE_NAME}"
          if [ -f target/release/liblindera_php.so ]; then
            cp target/release/liblindera_php.so "${ARCHIVE_NAME}/"
          elif [ -f target/release/liblindera_php.dylib ]; then
            cp target/release/liblindera_php.dylib "${ARCHIVE_NAME}/"
          fi
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-${{ matrix.platform.target }}-${{ github.ref_name }}
          path: lindera-php-*.tar.gz
          if-no-files-found: error

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: lindera-php-*.tar.gz
          tag_name: ${{ github.ref_name }}

  build-wasm:
    name: Build WASM (${{ matrix.target.name }})
    needs: [create-release]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        target:
          - value: "web"
            name: "web"
          - value: "bundler"
            name: "bundler"
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build WASM
        shell: bash
        run: |
          cd lindera-wasm
          wasm-pack build --release --target ${{ matrix.target.value }}

      - name: Copy JS helpers to pkg
        shell: bash
        run: |
          cp lindera-wasm/js/opfs.js lindera-wasm/pkg/
          cp lindera-wasm/js/opfs.d.ts lindera-wasm/pkg/

      - name: Update package.json
        shell: bash
        run: |
          cd lindera-wasm/pkg
          jq '
            .name = "lindera-wasm-${{ matrix.target.name }}" |
            .description = "Lindera WASM (${{ matrix.target.name }} target)" |
            .files += ["opfs.js", "opfs.d.ts"] |
            .exports = {
              ".": {
                "types": "./lindera_wasm.d.ts",
                "default": "./lindera_wasm.js"
              },
              "./opfs": {
                "types": "./opfs.d.ts",
                "default": "./opfs.js"
              }
            }
          ' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg-lindera-wasm-${{ matrix.target.name }}
          path: lindera-wasm/pkg

  build-lindera-nodejs:
    name: Build Node.js Native (${{ matrix.platform.target }})
    needs: [create-release]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Install dependencies and build
        working-directory: lindera-nodejs
        shell: bash
        run: |
          npm install
          npx napi build --platform --release -p lindera-nodejs --target ${{ matrix.platform.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nodejs-binding-${{ matrix.platform.target }}
          path: lindera-nodejs/*.node
          if-no-files-found: error

  publish-crates:
    name: Publish crates
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish crates
        run: |
          for crate in lindera-crf lindera-dictionary lindera-cc-cedict lindera-jieba lindera-ipadic lindera-ipadic-neologd lindera-ko-dic lindera-unidic lindera lindera-python lindera-nodejs lindera-ruby lindera-cli lindera-wasm lindera-cli; do
            VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r ".packages[] | select(.name==\"$crate\") | .version")
            PUBLISHED_VERSIONS=$(curl -s -A "lindera-release-workflow (https://github.com/lindera/lindera)" "https://crates.io/api/v1/crates/$crate" | jq -r 'select(.versions != null) | .versions[].num')
            if echo "${PUBLISHED_VERSIONS}" | grep -Fx "${VERSION}" >/dev/null; then
              echo "$crate $VERSION has already published"
            else
              echo "Publishing $crate $VERSION..."
              pushd $crate
              cargo publish
              popd
              sleep 20
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [build-python-wheels, build-python-sdist]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  publish-wasm-npm:
    name: Publish WASM to npm (${{ matrix.target.name }})
    needs: [build-wasm]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        target:
          - value: "web"
            name: "web"
          - value: "bundler"
            name: "bundler"
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: wasm-pkg-lindera-wasm-${{ matrix.target.name }}
          path: lindera-wasm/pkg

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Sync version from Cargo.toml
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="lindera-wasm") | .version')
          echo "Syncing npm version to ${VERSION}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('lindera-wasm/pkg/package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('lindera-wasm/pkg/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        run: |
          cd lindera-wasm/pkg
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} has already been published, skipping"
          else
            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}..."
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

  publish-nodejs-npm:
    name: Publish Node.js to npm
    needs: [build-lindera-nodejs]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all Node.js binding artifacts
        uses: actions/download-artifact@v8
        with:
          path: lindera-nodejs/artifacts
          pattern: "nodejs-binding-*"
          merge-multiple: true

      - name: Sync version from Cargo.toml
        working-directory: lindera-nodejs
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="lindera-nodejs") | .version')
          echo "Syncing npm version to ${VERSION}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[key] = '${VERSION}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        working-directory: lindera-nodejs
        run: npm install

      - name: Prepare npm packages
        working-directory: lindera-nodejs
        run: |
          npx napi create-npm-dirs
          npx napi artifacts --output-dir artifacts

      - name: Publish to npm
        working-directory: lindera-nodejs
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} has already been published, skipping"
            exit 0
          fi

          # Publish platform-specific packages first
          for dir in npm/*/; do
            if [ -f "${dir}package.json" ]; then
              PKG=$(node -p "require('./${dir}package.json').name")
              PKG_VER=$(node -p "require('./${dir}package.json').version")
              if npm view "${PKG}@${PKG_VER}" version 2>/dev/null; then
                echo "${PKG}@${PKG_VER} already published, skipping"
              else
                echo "Publishing ${PKG}@${PKG_VER}..."
                pushd "${dir}"
                npm publish --access public
                popd
              fi
            fi
          done

          # Publish the main package
          npm publish --access public

  publish-rubygems:
    name: Publish to RubyGems
    needs: [build-ruby-gems]
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Download gem artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gem-*
          merge-multiple: true
          path: gems

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
        run: |
          for gem in gems/*.gem; do
            echo "Publishing ${gem}..."
            gem_name=$(basename "${gem}" .gem | sed 's/-[0-9].*//')
            gem_version=$(basename "${gem}" .gem | grep -oP '\d+\.\d+\.\d+')
            if gem search "^${gem_name}$" --versions --exact | grep -q "${gem_version}"; then
              echo "${gem_name} ${gem_version} already published, skipping"
            else
              gem push "${gem}"
            fi
          done
