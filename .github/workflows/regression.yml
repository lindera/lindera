name: Regression Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

jobs:
  format:
    name: Format
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Run format
        run: cargo fmt --all -- --check

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      lindera-crf: ${{ steps.filter.outputs.lindera-crf }}
      lindera-dictionary: ${{ steps.filter.outputs.lindera-dictionary }}
      lindera-ipadic: ${{ steps.filter.outputs.lindera-ipadic }}
      lindera-ipadic-neologd: ${{ steps.filter.outputs.lindera-ipadic-neologd }}
      lindera-unidic: ${{ steps.filter.outputs.lindera-unidic }}
      lindera-ko-dic: ${{ steps.filter.outputs.lindera-ko-dic }}
      lindera-cc-cedict: ${{ steps.filter.outputs.lindera-cc-cedict }}
      lindera-jieba: ${{ steps.filter.outputs.lindera-jieba }}
      lindera: ${{ steps.filter.outputs.lindera }}
      lindera-cli: ${{ steps.filter.outputs.lindera-cli }}
      lindera-python: ${{ steps.filter.outputs.lindera-python }}
      lindera-nodejs: ${{ steps.filter.outputs.lindera-nodejs }}
      lindera-wasm: ${{ steps.filter.outputs.lindera-wasm }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            lindera-crf:
              - 'lindera-crf/**'
            lindera-dictionary:
              - 'lindera-dictionary/**'
              - 'lindera-crf/**'
            lindera-ipadic:
              - 'lindera-ipadic/**'
              - 'lindera-dictionary/**'
            lindera-ipadic-neologd:
              - 'lindera-ipadic-neologd/**'
              - 'lindera-dictionary/**'
            lindera-unidic:
              - 'lindera-unidic/**'
              - 'lindera-dictionary/**'
            lindera-ko-dic:
              - 'lindera-ko-dic/**'
              - 'lindera-dictionary/**'
            lindera-cc-cedict:
              - 'lindera-cc-cedict/**'
              - 'lindera-dictionary/**'
            lindera-jieba:
              - 'lindera-jieba/**'
              - 'lindera-dictionary/**'
            lindera:
              - 'lindera/**'
              - 'lindera-crf/**'
              - 'lindera-dictionary/**'
              - 'lindera-ipadic/**'
              - 'lindera-ipadic-neologd/**'
              - 'lindera-unidic/**'
              - 'lindera-ko-dic/**'
              - 'lindera-cc-cedict/**'
              - 'lindera-jieba/**'
            lindera-cli:
              - 'lindera-cli/**'
              - 'lindera/**'
              - 'lindera-crf/**'
              - 'lindera-dictionary/**'
              - 'lindera-ipadic/**'
              - 'lindera-ipadic-neologd/**'
              - 'lindera-unidic/**'
              - 'lindera-ko-dic/**'
              - 'lindera-cc-cedict/**'
              - 'lindera-jieba/**'
            lindera-python:
              - 'lindera-python/**'
              - 'lindera/**'
              - 'lindera-crf/**'
              - 'lindera-dictionary/**'
              - 'lindera-ipadic/**'
              - 'lindera-ipadic-neologd/**'
              - 'lindera-unidic/**'
              - 'lindera-ko-dic/**'
              - 'lindera-cc-cedict/**'
              - 'lindera-jieba/**'
            lindera-nodejs:
              - 'lindera-nodejs/**'
              - 'lindera/**'
              - 'lindera-crf/**'
              - 'lindera-dictionary/**'
              - 'lindera-ipadic/**'
              - 'lindera-ipadic-neologd/**'
              - 'lindera-unidic/**'
              - 'lindera-ko-dic/**'
              - 'lindera-cc-cedict/**'
              - 'lindera-jieba/**'
            lindera-wasm:
              - 'lindera-wasm/**'
              - 'lindera/**'
              - 'lindera-crf/**'
              - 'lindera-dictionary/**'
              - 'lindera-ipadic/**'
              - 'lindera-ipadic-neologd/**'
              - 'lindera-unidic/**'
              - 'lindera-ko-dic/**'
              - 'lindera-cc-cedict/**'
              - 'lindera-jieba/**'

  test-lindera-crf:
    name: Test lindera-crf
    needs: [format, detect-changes]
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-crf == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-crf --all-features

  test-lindera-dictionary:
    name: Test lindera-dictionary (${{ matrix.platform.target }})
    needs: [format, test-lindera-crf, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-dictionary == 'true')
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-dictionary --target "${{ matrix.platform.target }}" --all-features

  test-lindera-ipadic:
    name: Test lindera-ipadic
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-ipadic == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-ipadic --all-features

  test-lindera-ipadic-neologd:
    name: Test lindera-ipadic-neologd
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-ipadic-neologd == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-ipadic-neologd --all-features

  test-lindera-unidic:
    name: Test lindera-unidic
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-unidic == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-unidic --all-features

  test-lindera-ko-dic:
    name: Test lindera-ko-dic
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-ko-dic == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-ko-dic --all-features

  test-lindera-cc-cedict:
    name: Test lindera-cc-cedict
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-cc-cedict == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-cc-cedict --all-features

  test-lindera-jieba:
    name: Test lindera-jieba
    needs: [test-lindera-dictionary, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-jieba == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-jieba --all-features

  test-lindera:
    name: Test lindera (${{ matrix.platform.target }})
    needs:
      - test-lindera-dictionary
      - test-lindera-ipadic
      - test-lindera-ipadic-neologd
      - test-lindera-unidic
      - test-lindera-ko-dic
      - test-lindera-cc-cedict
      - test-lindera-jieba
      - detect-changes
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera == 'true')
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera --target "${{ matrix.platform.target }}" --all-features

  test-lindera-cli:
    name: Test lindera-cli
    needs: [test-lindera, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-cli == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Run test
        run: cargo test -p lindera-cli --all-features

  test-lindera-python:
    name: Test lindera-python
    needs: [test-lindera, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-python == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Run Python test
        shell: bash
        run: |
          make init
          make python-test

  test-lindera-nodejs:
    name: Test lindera-nodejs
    needs: [test-lindera, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-nodejs == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Run Node.js build
        run: cargo build -p lindera-nodejs --all-features

  test-lindera-wasm:
    name: Test lindera-wasm
    needs: [test-lindera, detect-changes]
    if: >-
      !cancelled() && !failure() &&
      (github.event_name != 'pull_request' || needs.detect-changes.outputs.lindera-wasm == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Run WASM test
        run: make wasm-test
