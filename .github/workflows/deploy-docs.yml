name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'lindera-wasm/**'
      - 'Cargo.toml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # To push to the gh-pages branch.
    steps:
      - uses: actions/checkout@v6

      - name: Install mdBook
        run: |
          mkdir mdbook
          curl -L https://github.com/rust-lang/mdBook/releases/download/v0.4.37/mdbook-v0.4.37-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C mdbook
          echo "$PWD/mdbook" >> $GITHUB_PATH

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Build Book (English)
        run: mdbook build docs

      - name: Build Book (Japanese)
        run: mdbook build docs/ja

      - name: Build WASM example
        run: make build-lindera-wasm-example

      - name: Setup Pages Directory
        run: |
          mv docs/ja/book docs/book/ja
          mkdir -p docs/book/demo
          cp -r lindera-wasm/example/dist/* docs/book/demo/

      - name: Download dictionaries from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p docs/book/demo/dict
          DICTS="lindera-ipadic lindera-unidic lindera-ko-dic lindera-cc-cedict lindera-jieba"
          echo "{" > docs/book/demo/dict/manifest.json
          FIRST=true
          for dict in $DICTS; do
            echo "Downloading ${dict}..."
            gh release download --repo lindera/lindera --pattern "${dict}-*.zip" --dir docs/book/demo/dict || continue
            FILENAME=$(ls docs/book/demo/dict/${dict}-*.zip 2>/dev/null | head -1 | xargs basename)
            if [ -n "$FILENAME" ]; then
              SHORT_NAME="${dict#lindera-}"
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> docs/book/demo/dict/manifest.json
              fi
              printf '  "%s": "%s"' "$SHORT_NAME" "$FILENAME" >> docs/book/demo/dict/manifest.json
            fi
          done
          echo "" >> docs/book/demo/dict/manifest.json
          echo "}" >> docs/book/demo/dict/manifest.json
          echo "Manifest:"
          cat docs/book/demo/dict/manifest.json
          echo "Downloaded dictionaries:"
          ls -lh docs/book/demo/dict/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
