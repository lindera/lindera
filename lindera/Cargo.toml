[package]
name = "lindera"
version = { workspace = true }
edition = { workspace = true }
description = "A morphological analysis library."
documentation = "https://docs.rs/lindera"
homepage = { workspace = true }
repository = { workspace = true }
readme = "README.md"
keywords = ["morphological", "analysis", "library"]
categories = { workspace = true }
license = { workspace = true }

[features]
embed-ipadic = [
    "lindera-ipadic/embed-ipadic",
] # Embed IPADIC dictionary in the binary
embed-ipadic-neologd = [
    "lindera-ipadic-neologd/embed-ipadic-neologd",
] # Embed IPADIC-NEologd dictionary in the binary
embed-unidic = [
    "lindera-unidic/embed-unidic",
] # Embed UniDic dictionary in the binary
embed-ko-dic = [
    "lindera-ko-dic/embed-ko-dic",
] # Embed ko-dic dictionary in the binary
embed-cc-cedict = [
    "lindera-cc-cedict/embed-cc-cedict",
] # Embed CC-CEDICT dictionary in the binary
embed-jieba = [
    "lindera-jieba/embed-jieba",
] # Embed Jieba dictionary in the binary
embed-cjk = [
    "embed-ipadic",
    "embed-ko-dic",
    "embed-jieba",
] # Embed CJK dictionaries (IPADIC, ko-dic, Jieba) in the binary
embed-cjk2 = [
    "embed-unidic",
    "embed-ko-dic",
    "embed-jieba",
] # Embed CJK dictionaries (UniDic, ko-dic, Jieba) in the binary
embed-cjk3 = [
    "embed-ipadic-neologd",
    "embed-ko-dic",
    "embed-jieba",
] # Embed CJK dictionaries (IPADIC NEologd, ko-dic, Jieba) in the binary
mmap = ["lindera-dictionary/mmap"] # Use memory-mapped file
train = ["lindera-dictionary/train"] # Enable training functionality
analysis = [
    "dep:daachorse",
    "dep:kanaria",
    "dep:regex",
    "dep:serde_yaml_ng",
    "dep:unicode-blocks",
    "dep:unicode-normalization",
    "dep:unicode-segmentation",
] # Enable the analysis chain (character filters, token filters, tokenizer)
default = ["mmap", "analysis"]

[dependencies]
anyhow = { workspace = true }
daachorse = { workspace = true, optional = true }
kanaria = { version = "0.2.0", optional = true }
lindera-cc-cedict = { workspace = true, optional = true }
lindera-dictionary = { workspace = true }
lindera-ipadic = { workspace = true, optional = true }
lindera-ipadic-neologd = { workspace = true, optional = true }
lindera-jieba = { workspace = true, optional = true }
lindera-ko-dic = { workspace = true, optional = true }
lindera-unidic = { workspace = true, optional = true }
percent-encoding = "2.3.2"
regex = { workspace = true, optional = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml_ng = { version = "0.10.0", optional = true }
strum = { workspace = true }
strum_macros = { workspace = true }
unicode-blocks = { version = "0.1.9", optional = true }
unicode-normalization = { version = "0.1.25", optional = true }
unicode-segmentation = { version = "1.13.3", optional = true }
url = "2.5.8"

[dev-dependencies]
criterion = { version = "0.8.2", default-features = false, features = [
    "html_reports",
] }
insta = "1.48.0"
once_cell = { workspace = true }
serde_json = { workspace = true }

[package.metadata.docs.rs]
rustdoc-args = ["--cfg", "docsrs"]

[[example]]
name = "tokenize"
required-features = ["analysis"]

[[example]]
name = "tokenize_with_config"
required-features = ["analysis"]

[[example]]
name = "tokenize_with_filters"
required-features = ["analysis"]

[[example]]
name = "tokenize_with_user_dict"
required-features = ["analysis"]

[[bench]]
name = "bench_ipadic"
harness = false
required-features = ["embed-ipadic"]

[[bench]]
name = "bench_unidic"
harness = false
required-features = ["embed-unidic"]

[[bench]]
name = "bench_ko_dic"
harness = false
required-features = ["embed-ko-dic"]

[[bench]]
name = "bench_cc_cedict"
harness = false
required-features = ["embed-cc-cedict"]

[[bench]]
name = "bench_ipadic_neologd"
harness = false
required-features = ["embed-ipadic-neologd"]

[[bench]]
name = "bench_jieba"
harness = false
required-features = ["embed-jieba"]
